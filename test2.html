<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body style="margin:0;background:#0d0d0d;color:white;font-family:sans-serif">

<div id="screen" style="position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:16px">
  <div style="font-size:48px">Vault.</div>
  <div style="font-size:13px;color:#888">private · local · yours</div>
  <div id="plist" style="width:100%;max-width:320px"></div>
  <div style="width:100%;height:1px;background:#333;max-width:320px"></div>
  <button id="create-btn" style="width:100%;max-width:320px;background:transparent;border:1px dashed #555;border-radius:14px;padding:14px;color:#999;font-size:14px;cursor:pointer" onclick="document.getElementById('msg').textContent='Button works!'">+ Create new profile</button>
  <div id="msg" style="color:#d4a853;font-size:14px"></div>
</div>

<script>
document.getElementById('plist').innerHTML = '<div style="background:#161616;border:1px solid #333;border-radius:14px;padding:14px;margin-bottom:10px;color:white">Test Profile Card</div>';
</script>
</body>
</html>
