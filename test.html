<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
body { background: #0d0d0d; color: white; font-family: sans-serif; padding: 40px; }
.step { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; font-size: 14px; }
.ok { border-color: #6bcf7f; color: #6bcf7f; }
.err { border-color: #e05c5c; color: #e05c5c; }
</style>
</head>
<body>
<h2 style="color:#d4a853;margin-bottom:20px">Vault Diagnostics</h2>
<div id="log"></div>

<script>
function log(msg, ok) {
  const div = document.createElement('div');
  div.className = 'step ' + (ok === false ? 'err' : ok === true ? 'ok' : '');
  div.textContent = msg;
  document.getElementById('log').appendChild(div);
}

log('✓ JavaScript is running', true);
log('✓ DOM is ready', true);

// Test 1: IndexedDB
try {
  if (typeof indexedDB !== 'undefined') {
    log('✓ IndexedDB is available', true);
    const req = indexedDB.open('vault_test', 1);
    req.onsuccess = () => log('✓ IndexedDB opened successfully', true);
    req.onerror = (e) => log('✗ IndexedDB open failed: ' + e.target.error, false);
  } else {
    log('✗ IndexedDB not available', false);
  }
} catch(e) {
  log('✗ IndexedDB error: ' + e.message, false);
}

// Test 2: crypto.subtle
try {
  if (typeof crypto !== 'undefined' && crypto.subtle) {
    log('✓ crypto.subtle is available', true);
  } else {
    log('✗ crypto.subtle not available — this blocks password hashing', false);
  }
} catch(e) {
  log('✗ crypto error: ' + e.message, false);
}

// Test 3: crypto.getRandomValues
try {
  crypto.getRandomValues(new Uint8Array(8));
  log('✓ crypto.getRandomValues works', true);
} catch(e) {
  log('✗ crypto.getRandomValues failed: ' + e.message, false);
}

// Test 4: Fetch API
try {
  if (typeof fetch !== 'undefined') {
    log('✓ fetch API available', true);
  } else {
    log('✗ fetch not available', false);
  }
} catch(e) {
  log('✗ fetch error: ' + e.message, false);
}

// Test 5: async/await
(async () => {
  try {
    await new Promise(r => setTimeout(r, 10));
    log('✓ async/await works', true);
  } catch(e) {
    log('✗ async/await failed: ' + e.message, false);
  }
})();

// Test 6: CSS custom properties
const testEl = document.createElement('div');
testEl.style.color = 'var(--test)';
document.body.appendChild(testEl);
const computed = getComputedStyle(testEl).color;
document.body.removeChild(testEl);
log('✓ CSS custom properties: ' + (computed ? 'supported' : 'unknown'), true);

// Test 7: Google Fonts
const link = document.createElement('link');
link.rel = 'stylesheet';
link.href = 'https://fonts.googleapis.com/css2?family=Outfit:wght@400&display=swap';
link.onload = () => log('✓ Google Fonts loaded successfully', true);
link.onerror = () => log('✗ Google Fonts failed to load — this may cause blank screen', false);
document.head.appendChild(link);

log('All sync tests done. Waiting for async results...', null);
</script>
</body>
</html>
